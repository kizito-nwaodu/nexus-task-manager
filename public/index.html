<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; transition: all 0.2s ease-in-out; }
        .glass-effect { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-grid { background-image: linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
        .blob { position: absolute; filter: blur(80px); opacity: 0.3; animation: float 10s infinite; z-index: -1; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#020617] text-white overflow-x-hidden min-h-screen">
    <div class="fixed inset-0 bg-grid pointer-events-none"></div>
    <div class="blob bg-indigo-600 w-96 h-96 rounded-full top-0 left-0"></div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 px-4">
        <div class="glass-effect p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <div id="auth-ui">
                <h1 class="text-4xl font-bold mb-2 gradient-text">Nexus</h1>
                <p class="text-slate-400 mb-10 text-sm">Organizational Identity Access</p>
                <div id="login-form">
                    <input id="l-email" type="email" placeholder="Work Email" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 mb-4 outline-none focus:border-indigo-500">
                    <input id="l-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 mb-8 outline-none">
                    <button onclick="login()" class="w-full py-4 bg-indigo-600 rounded-2xl font-bold hover:scale-105 transition-all">Sign In</button>
                    <p class="mt-6 text-center text-sm text-slate-500">First in org? <a href="javascript:toggleAuth()" class="text-indigo-400">Register as Admin</a></p>
                </div>
                <div id="reg-form" class="hidden">
                    <input id="r-name" type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 mb-4">
                    <input id="r-email" type="email" placeholder="Work Email" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 mb-4">
                    <input id="r-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 mb-8">
                    <button onclick="register()" class="w-full py-4 bg-emerald-600 rounded-2xl font-bold">Initialize Org</button>
                    <p class="mt-6 text-center text-sm text-slate-500"><a href="javascript:toggleAuth()" class="text-indigo-400">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="app" class="relative z-10 hidden">
        <!-- Navigation -->
        <nav class="glass-effect sticky top-0 z-50 px-8 py-4 border-b border-white/5">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20"><i data-lucide="layers" class="w-6 h-6 text-white"></i></div>
                    <span class="text-2xl font-bold gradient-text">Nexus</span>
                </div>
                <div class="flex items-center space-x-8">
                    <button onclick="showView('dash')" class="text-sm hover:text-indigo-400 font-medium">Dashboard</button>
                    <button id="nav-team" onclick="showView('team')" class="text-sm hover:text-indigo-400 font-medium hidden">Team Management</button>
                    <div class="h-6 w-px bg-white/10"></div>
                    <div class="text-right">
                        <p id="u-name" class="text-sm font-bold"></p>
                        <p id="u-role" class="text-[10px] text-indigo-400 font-bold uppercase"></p>
                    </div>
                    <button onclick="logout()" class="p-2 bg-white/5 rounded-lg text-red-500"><i data-lucide="power" class="w-4 h-4"></i></button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-8 py-10">
            <!-- ADMIN & MEMBER DASHBOARD -->
            <div id="dash-view" class="view-section">
                <!-- Stat Cards (Admin Only) -->
                <div id="admin-stats" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10 hidden">
                    <div class="glass-effect p-6 rounded-3xl">
                        <div class="flex justify-between mb-4"><div class="w-10 h-10 bg-indigo-500/20 rounded-xl flex items-center justify-center"><i data-lucide="briefcase" class="text-indigo-500"></i></div><span class="text-emerald-400 text-xs font-bold">+12%</span></div>
                        <h3 class="text-3xl font-bold">24</h3><p class="text-slate-500 text-xs">Active Projects</p>
                    </div>
                    <div class="glass-effect p-6 rounded-3xl">
                        <div class="flex justify-between mb-4"><div class="w-10 h-10 bg-pink-500/20 rounded-xl flex items-center justify-center"><i data-lucide="check-circle" class="text-pink-500"></i></div><span class="text-emerald-400 text-xs font-bold">+8%</span></div>
                        <h3 class="text-3xl font-bold">156</h3><p class="text-slate-500 text-xs">Completed</p>
                    </div>
                    <div class="glass-effect p-6 rounded-3xl">
                        <div class="flex justify-between mb-4"><div class="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center"><i data-lucide="users" class="text-emerald-500"></i></div><span class="text-emerald-400 text-xs font-bold" id="st-users-plus">+3</span></div>
                        <h3 class="text-3xl font-bold" id="st-users-count">0</h3><p class="text-slate-500 text-xs">Team Members</p>
                    </div>
                    <div class="glass-effect p-6 rounded-3xl border-2 border-indigo-500/20">
                        <button onclick="inviteUser()" class="w-full h-full text-left">
                            <p class="text-indigo-400 text-xs font-bold mb-2">WORKSPACE</p>
                            <h3 class="text-xl font-bold">+ Invite User</h3>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Kanban Board -->
                    <div class="lg:col-span-2 glass-effect p-8 rounded-[2.5rem]">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-xl font-bold flex items-center space-x-2"><i data-lucide="kanban" class="text-indigo-400"></i><span>Organization Board</span></h2>
                            <button onclick="openModal()" class="bg-indigo-600 px-4 py-2 rounded-xl text-sm font-bold">New Task</button>
                        </div>
                        <div class="grid grid-cols-3 gap-6">
                            <div class="space-y-4"><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">To Do</p><div id="col-todo" class="space-y-3"></div></div>
                            <div class="space-y-4"><p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">In Progress</p><div id="col-progress" class="space-y-3"></div></div>
                            <div class="space-y-4"><p class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Completed</p><div id="col-done" class="space-y-3"></div></div>
                        </div>
                    </div>
                    <!-- Activity -->
                    <div class="glass-effect p-8 rounded-[2.5rem]">
                        <h3 class="font-bold mb-6 flex items-center space-x-2"><i data-lucide="activity" class="text-pink-400"></i><span>Recent Activity</span></h3>
                        <div id="activity-feed" class="space-y-6"></div>
                    </div>
                </div>
            </div>

            <!-- TEAM MANAGEMENT VIEW -->
            <div id="team-view" class="view-section hidden">
                <div class="flex justify-between items-center mb-10">
                    <h1 class="text-4xl font-black">User Directory</h1>
                    <button onclick="inviteUser()" class="bg-indigo-600 px-6 py-2 rounded-xl font-bold">Invite Colleague</button>
                </div>
                <div class="glass-effect rounded-3xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-slate-500 text-[10px] font-black uppercase">
                            <tr><th class="p-6">Name</th><th>Email</th><th>Role</th></tr>
                        </thead>
                        <tbody id="team-table"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- TASK MODAL -->
    <div id="task-modal" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-md hidden items-center justify-center p-4">
        <div class="glass-effect p-10 rounded-[2.5rem] w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6">Create Task</h2>
            <input id="t-title" type="text" placeholder="Title" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 mb-4 outline-none">
            <textarea id="t-desc" placeholder="Brief details..." class="w-full p-4 bg-white/5 rounded-xl border border-white/10 mb-6 h-32"></textarea>
            <div class="flex space-x-4"><button onclick="closeModal()" class="flex-1 py-4">Cancel</button><button onclick="saveTask()" class="flex-1 py-4 bg-indigo-600 rounded-xl font-bold">Save</button></div>
        </div>
    </div>

    <script>
        const API = "/api";
        let token = localStorage.getItem('nexus_token');
        let user = JSON.parse(localStorage.getItem('nexus_user'));

        function toggleAuth() { document.getElementById('login-form').classList.toggle('hidden'); document.getElementById('reg-form').classList.toggle('hidden'); }
        async function register() {
            const data = { name: document.getElementById('r-name').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value };
            await axios.post(`${API}/auth/register`, data);
            alert("Org Initialized! Log in now."); toggleAuth();
        }
        async function login() {
            const email = document.getElementById('l-email').value;
            const password = document.getElementById('l-pass').value;
            try {
                const res = await axios.post(`${API}/auth/login`, { email, password });
                localStorage.setItem('nexus_token', res.data.token);
                localStorage.setItem('nexus_user', JSON.stringify(res.data.user));
                location.reload();
            } catch(e) { alert("Login failed"); }
        }
        function logout() { localStorage.clear(); location.reload(); }
        function showView(v) { document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden')); document.getElementById(`${v}-view`).classList.remove('hidden'); loadData(); }

        async function loadData() {
            const config = { headers: { Authorization: token } };
            const [tasks, activities, team] = await Promise.all([
                axios.get(`${API}/tasks`, config),
                axios.get(`${API}/activities`, config),
                user.role === 'admin' ? axios.get(`${API}/admin/users`, config) : Promise.resolve({data:[]})
            ]);

            ['todo','progress','done'].forEach(st => {
                document.getElementById(`col-${st}`).innerHTML = tasks.data.filter(t => t.status === st).map(t => `
                    <div class="p-4 bg-white/5 rounded-2xl border border-white/5 shadow-lg">
                        <h4 class="font-bold text-sm mb-1">${t.title}</h4>
                        <p class="text-[10px] text-slate-500">${t.desc}</p>
                    </div>
                `).join('');
            });

            document.getElementById('activity-feed').innerHTML = activities.data.map(a => `
                <div class="flex items-center space-x-3 text-[11px]">
                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <p><b class="text-indigo-400">${a.userName}</b> ${a.action} <span class="text-slate-500">${a.target}</span></p>
                </div>
            `).join('');

            if(user.role === 'admin') {
                document.getElementById('st-users-count').innerText = team.data.length;
                document.getElementById('team-table').innerHTML = team.data.map(u => `
                    <tr class="border-t border-white/5"><td class="p-6 font-bold">${u.name}</td><td>${u.email}</td><td><span class="text-indigo-400 text-[10px] font-bold uppercase">${u.role}</span></td></tr>
                `).join('');
            }
        }

        async function inviteUser() {
            const name = prompt("Colleague Name:"); const email = prompt("Work Email:");
            if(!name || !email) return;
            await axios.post(`${API}/admin/invite`, { name, email, role: 'member' }, { headers: { Authorization: token } });
            loadData();
        }

        function openModal() { document.getElementById('task-modal').classList.remove('hidden'); document.getElementById('task-modal').classList.add('flex'); }
        function closeModal() { document.getElementById('task-modal').classList.add('hidden'); }
        async function saveTask() {
            const data = { title: document.getElementById('t-title').value, desc: document.getElementById('t-desc').value, status: 'todo', priority: 'medium', date: new Date().toLocaleDateString() };
            await axios.post(`${API}/tasks`, data, { headers: { Authorization: token } });
            closeModal(); loadData();
        }

        if (token) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('u-name').innerText = user.name;
            document.getElementById('u-role').innerText = user.role;
            if(user.role === 'admin') {
                document.getElementById('admin-stats').classList.remove('hidden');
                document.getElementById('nav-team').classList.remove('hidden');
            }
            showView('dash');
            setInterval(loadData, 10000);
        }
        lucide.createIcons();
    </script>
</body>
</html>
