<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Enterprise Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-active { background: #6366f1; color: white; }
    </style>
</head>
<body class="flex h-screen">

    <!-- LOGIN UI -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950">
        <div class="glass p-10 rounded-3xl w-full max-w-md">
            <h1 class="text-3xl font-bold mb-8">Nexus Portal</h1>
            <input id="l-email" type="email" placeholder="Email" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 mb-4">
            <input id="l-pass" type="password" placeholder="Password" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 mb-8">
            <button onclick="login()" class="w-full py-4 bg-indigo-600 rounded-xl font-bold">Sign In</button>
            <p class="mt-4 text-center text-xs text-slate-500 italic">Login: admin@nexus.com / password</p>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-64 glass border-r border-white/5 flex flex-col p-6 hidden">
        <div class="flex items-center space-x-3 mb-12">
            <div class="bg-indigo-600 p-2 rounded-lg"><i data-lucide="layers" class="w-5 h-5"></i></div>
            <span class="text-xl font-bold">Nexus</span>
        </div>
        <nav class="flex-1 space-y-1">
            <button onclick="showView('dash')" class="v-link w-full flex items-center space-x-3 p-3 rounded-xl hover:bg-white/5"><i data-lucide="home" class="w-4 h-4"></i><span>Dashboard</span></button>
            <button onclick="showView('projects')" class="v-link w-full flex items-center space-x-3 p-3 rounded-xl hover:bg-white/5"><i data-lucide="briefcase" class="w-4 h-4"></i><span>Projects</span></button>
            <button onclick="showView('team')" class="v-link w-full flex items-center space-x-3 p-3 rounded-xl hover:bg-white/5"><i data-lucide="users" class="w-4 h-4"></i><span>Team</span></button>
            <button onclick="showView('audit')" class="v-link w-full flex items-center space-x-3 p-3 rounded-xl hover:bg-white/5"><i data-lucide="shield-check" class="w-4 h-4"></i><span>Audit Log</span></button>
        </nav>
        <div class="pt-6 border-t border-white/5">
            <p id="u-name" class="font-bold text-sm mb-1"></p>
            <p id="u-role" class="text-[10px] uppercase text-indigo-400 font-bold mb-4"></p>
            <button onclick="logout()" class="text-xs text-red-400">Logout</button>
        </div>
    </aside>

    <!-- CONTENT -->
    <main id="main-content" class="flex-1 overflow-y-auto p-10 hidden">
        
        <!-- DASHBOARD -->
        <div id="v-dash" class="view space-y-8">
            <h1 class="text-4xl font-black">Global Command</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-8 rounded-3xl"><p class="text-slate-500 text-sm">Total Projects</p><h2 id="st-projects" class="text-4xl font-bold">0</h2></div>
                <div class="glass p-8 rounded-3xl"><p class="text-slate-500 text-sm">Active Members</p><h2 id="st-users" class="text-4xl font-bold">0</h2></div>
                <div class="glass p-8 rounded-3xl"><p class="text-slate-500 text-sm">Tasks Tracked</p><h2 id="st-tasks" class="text-4xl font-bold">0</h2></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-3xl">
                    <h3 class="font-bold mb-6">Recent Activity</h3>
                    <div id="mini-audit" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <!-- PROJECTS -->
        <div id="v-projects" class="view hidden space-y-8">
            <div class="flex justify-between items-center">
                <h1 class="text-4xl font-black">Projects</h1>
                <button onclick="createProject()" class="bg-indigo-600 px-6 py-2 rounded-xl font-bold">Create Project</button>
            </div>
            <div id="project-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- TEAM MANAGEMENT -->
        <div id="v-team" class="view hidden space-y-8">
            <div class="flex justify-between items-center">
                <h1 class="text-4xl font-black">Team Control</h1>
                <button onclick="inviteUser()" class="bg-emerald-600 px-6 py-2 rounded-xl font-bold">Invite Member</button>
            </div>
            <div class="glass rounded-3xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-xs uppercase font-bold text-slate-500">
                        <tr><th class="p-6">Name</th><th>Email</th><th>Role</th><th class="p-6 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="user-table"></tbody>
                </table>
            </div>
        </div>

        <!-- AUDIT LOG -->
        <div id="v-audit" class="view hidden space-y-8">
            <h1 class="text-4xl font-black">Compliance Audit</h1>
            <div id="full-audit" class="space-y-2"></div>
        </div>
    </main>

    <script>
        let token = localStorage.getItem('nexus_token');
        let user = JSON.parse(localStorage.getItem('nexus_user'));
        const API = "/api";

        async function login() {
            const email = document.getElementById('l-email').value;
            const password = document.getElementById('l-pass').value;
            const res = await axios.post(`${API}/login`, { email, password });
            localStorage.setItem('nexus_token', res.data.token);
            localStorage.setItem('nexus_user', JSON.stringify(res.data.user));
            location.reload();
        }

        function logout() { localStorage.clear(); location.reload(); }

        function showView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
            document.getElementById(`v-${v}`).classList.remove('hidden');
            document.querySelectorAll('.v-link').forEach(l => l.classList.remove('nav-active'));
            loadData();
        }

        async function loadData() {
            const [users, projects, tasks, audit] = await Promise.all([
                axios.get(`${API}/users`, { headers: { Authorization: token }}),
                axios.get(`${API}/projects`, { headers: { Authorization: token }}),
                axios.get(`${API}/tasks`, { headers: { Authorization: token }}),
                axios.get(`${API}/activities`, { headers: { Authorization: token }})
            ]);

            // Stats
            document.getElementById('st-users').innerText = users.data.length;
            document.getElementById('st-projects').innerText = projects.data.length;
            document.getElementById('st-tasks').innerText = tasks.data.length;

            // Audit
            const auditHTML = audit.data.map(a => `
                <div class="p-4 bg-white/5 border border-white/5 rounded-xl flex justify-between text-sm">
                    <span><b class="text-indigo-400">${a.userName}</b> ${a.action} <b class="text-white">${a.target}</b></span>
                    <span class="text-slate-600">${new Date(a.timestamp).toLocaleTimeString()}</span>
                </div>
            `).join('');
            document.getElementById('mini-audit').innerHTML = auditHTML;
            document.getElementById('full-audit').innerHTML = auditHTML;

            // Users
            document.getElementById('user-table').innerHTML = users.data.map(u => `
                <tr class="border-t border-white/5">
                    <td class="p-6 font-bold">${u.name}</td>
                    <td>${u.email}</td>
                    <td><span class="px-2 py-1 rounded bg-indigo-500/20 text-indigo-400 text-[10px] font-bold uppercase">${u.role}</span></td>
                    <td class="p-6 text-right space-x-2">
                        <button onclick="changeRole(${u.id}, '${u.role === 'admin' ? 'user' : 'admin'}')" class="text-xs text-indigo-400">Flip Role</button>
                        <button onclick="removeUser(${u.id})" class="text-xs text-red-500">Remove</button>
                    </td>
                </tr>
            `).join('');

            // Projects
            document.getElementById('project-list').innerHTML = projects.data.map(p => `
                <div class="glass p-6 rounded-3xl border-l-4" style="border-color: ${p.color}">
                    <h4 class="font-bold text-lg mb-1">${p.name}</h4>
                    <p class="text-xs text-slate-500 mb-6">${p.desc}</p>
                    <button class="w-full py-2 bg-white/5 rounded-xl text-xs font-bold">Open Board</button>
                </div>
            `).join('');
        }

        async function inviteUser() {
            const name = prompt("Name:");
            const email = prompt("Email:");
            await axios.post(`${API}/users/
